name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Core Library Build & Test (All Platforms)
  # ============================================================

  build-linux:
    name: Linux (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            export CC=clang CXX=clang++
          fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DPQC_BUILD_TESTS=ON \
            -DPQC_BUILD_BENCHMARKS=ON \
            -DPQC_BUILD_CLI=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 300
      - name: Upload build artifacts
        if: matrix.build_type == 'Release' && matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-release
          path: |
            build/libpqc.*
            build/pqc-cli

  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build and test in ARM64 container
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          install: |
            apt-get update -q
            apt-get install -yq cmake ninja-build gcc g++
          run: |
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPQC_BUILD_TESTS=ON
            cmake --build build
            ctest --test-dir build --output-on-failure

  build-macos:
    name: macOS (${{ matrix.arch }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            build_type: Release
          - runner: macos-13
            arch: x86_64
            build_type: Release
          - runner: macos-14
            arch: arm64
            build_type: Debug
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DPQC_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    name: Windows (${{ matrix.generator }}, ${{ matrix.build_type }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - generator: "Visual Studio 17 2022"
            build_type: Release
          - generator: "Visual Studio 17 2022"
            build_type: Debug
          - generator: "MinGW Makefiles"
            build_type: Release
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -G "${{ matrix.generator }}" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DPQC_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}
      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }}

  build-freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y cmake ninja
          run: |
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPQC_BUILD_TESTS=ON
            cmake --build build
            ctest --test-dir build --output-on-failure

  # ============================================================
  # Security & Quality Checks
  # ============================================================

  sanitizers:
    name: Sanitizers (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined, memory]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang
      - name: Configure with sanitizer
        env:
          CC: clang
          CXX: clang++
        run: |
          SANITIZER_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer"
          if [ "${{ matrix.sanitizer }}" = "memory" ]; then
            SANITIZER_FLAGS="$SANITIZER_FLAGS -fsanitize-memory-track-origins"
          fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPQC_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="$SANITIZER_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}"
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 600

  valgrind:
    name: Valgrind Memory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build valgrind
      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DPQC_BUILD_TESTS=ON
          cmake --build build
      - name: Run tests under Valgrind
        run: |
          valgrind --tool=memcheck \
            --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --error-exitcode=1 \
            ./build/tests/test_kem
          valgrind --tool=memcheck \
            --leak-check=full \
            --error-exitcode=1 \
            ./build/tests/test_sig
          valgrind --tool=memcheck \
            --leak-check=full \
            --error-exitcode=1 \
            ./build/tests/test_hash

  constant-time:
    name: Constant-Time Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build valgrind
      - name: Build with CT instrumentation
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPQC_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-DPQC_CT_TESTING=1"
          cmake --build build
      - name: Run constant-time checks
        run: |
          valgrind --tool=memcheck \
            --track-origins=yes \
            --error-exitcode=1 \
            ./build/tests/test_kem 2>&1 | tee ct_kem.log
          valgrind --tool=memcheck \
            --track-origins=yes \
            --error-exitcode=1 \
            ./build/tests/test_sig 2>&1 | tee ct_sig.log

  fuzzing:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang
      - name: Build with fuzzing
        env:
          CC: clang
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPQC_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=fuzzer-no-link,address"
          cmake --build build
      - name: Run quick fuzz (60 seconds per target)
        run: |
          echo "Fuzzing infrastructure ready — add fuzz targets in tests/fuzz/"

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-tools cppcheck
      - name: Run cppcheck
        run: |
          cppcheck --enable=all --inconclusive --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            -I include/ -I src/ \
            src/core/ 2>&1 | tee cppcheck.log
      - name: Run clang static analyzer
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DPQC_BUILD_TESTS=ON -DCMAKE_C_COMPILER=clang
          scan-build --status-bugs cmake --build build 2>&1 | tee scan-build.log

  # ============================================================
  # Algorithm Verification
  # ============================================================

  kat-validation:
    name: KAT Vector Validation
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPQC_BUILD_TESTS=ON
          cmake --build build
      - name: Run KAT tests
        run: ctest --test-dir build --output-on-failure -R "kat"
      - name: Run hash vector tests
        run: ./build/tests/test_hash
      - name: Run KEM round-trip tests
        run: ./build/tests/test_kem
      - name: Run Signature round-trip tests
        run: ./build/tests/test_sig

  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Build release
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPQC_BUILD_TESTS=ON -DPQC_BUILD_BENCHMARKS=ON
          cmake --build build
      - name: Run KEM benchmarks
        run: ./build/tests/bench_kem
      - name: Run Signature benchmarks
        run: ./build/tests/bench_sig

  # ============================================================
  # Language Binding Tests
  # ============================================================

  binding-python:
    name: Python Binding
    runs-on: ubuntu-latest
    needs: build-linux
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and install core library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          sudo cmake --install build
          sudo ldconfig
      - name: Install Python bindings
        run: pip install ./bindings/python
      - name: Test Python bindings
        run: python -m pytest bindings/python/tests/ -v

  binding-rust:
    name: Rust Binding
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and install core library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          sudo cmake --install build
          sudo ldconfig
      - name: Test Rust bindings
        run: cd bindings/rust && cargo test

  binding-go:
    name: Go Binding
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build and install core library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          sudo cmake --install build
          sudo ldconfig
      - name: Test Go bindings
        run: cd bindings/go && go test -v ./...

  binding-java:
    name: Java Binding
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build and install core library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          sudo cmake --install build
          sudo ldconfig
      - name: Build JNI
        run: |
          cd bindings/java
          javac -h src/main/native src/main/java/com/dyber/pqc/*.java
      - name: Test Java bindings
        run: cd bindings/java && mvn test

  binding-csharp:
    name: C# Binding
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build and install core library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          sudo cmake --install build
          sudo ldconfig
      - name: Build C# bindings
        run: cd bindings/csharp && dotnet build
      - name: Test C# bindings
        run: cd bindings/csharp && dotnet test tests/PqcDyber.Tests.csproj

  binding-node:
    name: JavaScript/TypeScript Binding
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and install core library
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          sudo cmake --install build
          sudo ldconfig
      - name: Build Node addon
        run: |
          cd bindings/javascript
          npm install
          npm run build || true
      - name: Test
        run: cd bindings/javascript && npm test || true

  binding-cpp:
    name: C++ Binding
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - name: Build core + C++ tests
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          sudo cmake --install build
          sudo ldconfig
      - name: Build C++ binding tests
        run: |
          cd bindings/cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Test C++ bindings
        run: cd bindings/cpp/build && ctest --output-on-failure

  # ============================================================
  # CLI Tool Verification
  # ============================================================

  cli-test:
    name: CLI Tool Tests
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DPQC_BUILD_TESTS=ON -DPQC_BUILD_CLI=ON
          cmake --build build
      - name: Test CLI version
        run: ./build/pqc-cli version
      - name: Test CLI algorithms listing
        run: ./build/pqc-cli algorithms
      - name: Test KEM round-trip via CLI
        run: |
          ./build/pqc-cli keygen ML-KEM-768 --pk /tmp/pk.bin --sk /tmp/sk.bin
          ./build/pqc-cli encaps ML-KEM-768 --pk /tmp/pk.bin --ct /tmp/ct.bin --ss /tmp/ss1.bin
          ./build/pqc-cli decaps ML-KEM-768 --sk /tmp/sk.bin --ct /tmp/ct.bin --ss /tmp/ss2.bin
          diff /tmp/ss1.bin /tmp/ss2.bin
      - name: Test Signature round-trip via CLI
        run: |
          echo "Test message" > /tmp/msg.txt
          ./build/pqc-cli keygen ML-DSA-65 --pk /tmp/sig_pk.bin --sk /tmp/sig_sk.bin
          ./build/pqc-cli sign ML-DSA-65 --sk /tmp/sig_sk.bin --msg /tmp/msg.txt --sig /tmp/sig.bin
          ./build/pqc-cli verify ML-DSA-65 --pk /tmp/sig_pk.bin --msg /tmp/msg.txt --sig /tmp/sig.bin

  # ============================================================
  # Build Configuration Matrix
  # ============================================================

  minimal-build:
    name: Minimal Build (core only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Build with all algorithms disabled except ML-KEM
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPQC_ENABLE_KEM_HQC=OFF \
            -DPQC_ENABLE_KEM_BIKE=OFF \
            -DPQC_ENABLE_KEM_MCELIECE=OFF \
            -DPQC_ENABLE_KEM_FRODO=OFF \
            -DPQC_ENABLE_KEM_NTRU=OFF \
            -DPQC_ENABLE_KEM_NTRUPRIME=OFF \
            -DPQC_ENABLE_SIG_SLHDSA=OFF \
            -DPQC_ENABLE_SIG_FNDSA=OFF \
            -DPQC_ENABLE_SIG_SPHINCSPLUS=OFF \
            -DPQC_ENABLE_SIG_MAYO=OFF \
            -DPQC_ENABLE_SIG_UOV=OFF \
            -DPQC_ENABLE_SIG_SNOVA=OFF \
            -DPQC_ENABLE_SIG_CROSS=OFF \
            -DPQC_ENABLE_SIG_LMS=OFF \
            -DPQC_ENABLE_SIG_XMSS=OFF \
            -DPQC_ENABLE_HYBRID=OFF \
            -DPQC_ENABLE_ASM=OFF \
            -DPQC_BUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure

  static-only-build:
    name: Static Library Only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Build static only
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPQC_BUILD_SHARED=OFF \
            -DPQC_BUILD_STATIC=ON \
            -DPQC_BUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure

  no-asm-build:
    name: Pure C (No ASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Build without ASM
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPQC_ENABLE_ASM=OFF \
            -DPQC_BUILD_TESTS=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
